name: Guappa CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- TypeScript Lint & Test ----
  ts-test:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json
      - run: npm ci
      - run: npx jest --ci --forceExit

  # ---- Kotlin Unit Tests ----
  kotlin-unit:
    name: Kotlin Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json
      - run: cd .. && npm ci
      - uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew testDebugUnitTest

  # ---- Android Build ----
  android-build:
    name: Android Build (Debug)
    runs-on: ubuntu-latest
    needs: [ts-test, kotlin-unit]
    defaults:
      run:
        working-directory: mobile-app/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json
      - run: cd .. && npm ci
      - uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ---- Maestro E2E Tests ----
  maestro-e2e:
    name: Maestro E2E
    runs-on: ubuntu-latest
    needs: android-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: actions/download-artifact@v4
        with:
          name: debug-apk
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Start Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          heap-size: 512M
          ram-size: 4096M
          script: |
            curl -Ls "https://get.maestro.mobile.dev" | bash
            export PATH="$PATH":"$HOME/.maestro/bin"
            adb install app-debug.apk
            # Run smoke tests
            maestro test mobile-app/.maestro/guappa_all_screens_smoke.yaml || true
            maestro test mobile-app/.maestro/e2e_onboarding_flow.yaml || true
            maestro test mobile-app/.maestro/e2e_navigate_all_screens.yaml || true
