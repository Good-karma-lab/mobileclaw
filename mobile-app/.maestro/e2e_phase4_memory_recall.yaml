appId: com.guappa.app
---
# Phase 4: Ask agent to recall stored memory
# Prerequisite: "My wife's name is Kate" was stored (Phase 1)
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 15000

- assertVisible:
    id: chat-input
- tapOn:
    id: chat-input
- inputText: "What is my wife's name?"
- tapOn:
    id: chat-send-or-voice
- waitForAnimationToEnd:
    timeout: 120000

# Agent must recall "Kate"
- assertVisible:
    text: "Kate"
