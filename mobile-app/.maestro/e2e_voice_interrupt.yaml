appId: com.guappa.app
tags:
  - voice
  - interrupt
  - virtual-audio
---
# Voice Interrupt Test — Start TTS playback, then interrupt with new voice input
# Verifies the interruptible voice pipeline stops TTS and starts new STT
# Prerequisites: BlackHole 2ch, emulator mic = host audio

# Navigate to chat, send a message to trigger TTS response
- tapOn:
    id: "dock-tab-chat"
- waitForAnimationToEnd
- tapOn:
    id: "chat-input"
- inputText: "Tell me a long story about dragons"
- tapOn:
    id: "chat-send-button"

# Wait for agent to start responding (TTS should begin playing)
- extendedWaitUntil:
    notVisible:
      text: "GUAPPA is thinking..."
    timeout: 30000

# Now navigate to voice screen and interrupt with new speech
- tapOn:
    id: "dock-tab-voice"
- waitForAnimationToEnd

# Tap mic to start recording (this should interrupt TTS)
- tapOn:
    id: "voice-mic-button"

# Speak interruption via virtual audio cable
- runScript:
    file: scripts/generate_and_play.py
    args: ["Actually, stop. What is the weather today?"]

# Wait for new transcription
- extendedWaitUntil:
    visible:
      text: ".*weather.*|.*stop.*"
    timeout: 15000

# Stop recording
- tapOn:
    id: "voice-mic-button"
