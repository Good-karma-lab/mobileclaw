appId: com.guappa.app
---
# Test that agent remembers context across messages
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 15000
- assertVisible:
    id: chat-input
- tapOn:
    id: chat-input
- inputText: "Remember: my name is GuappaUser and my wife's name is Maria"
- hideKeyboard
- tapOn:
    id: chat-send-or-voice
- waitForAnimationToEnd:
    timeout: 120000
- assertNotVisible:
    text: "Backend error"
- assertNotVisible:
    text: "disabled"
- assertNotVisible:
    text: "not available"
# Second message — agent should recall from memory
- tapOn:
    id: chat-input
- inputText: "What is my wife's name?"
- hideKeyboard
- tapOn:
    id: chat-send-or-voice
- waitForAnimationToEnd:
    timeout: 120000
- assertNotVisible:
    text: "Backend error"
# Agent should recall Maria
- assertVisible:
    text: "Maria"
    optional: true
