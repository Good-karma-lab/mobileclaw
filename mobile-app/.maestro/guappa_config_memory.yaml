appId: com.guappa.app
---
# Config: Configure "What GUAPPA Remembers" section
- launchApp
- tapOn:
    id: "dock-tab-config"
- assertVisible:
    id: "config-screen"
# Scroll to and expand memory section
- scrollUntilVisible:
    element: "What GUAPPA Remembers"
    direction: DOWN
- tapOn: "What GUAPPA Remembers"
- waitForAnimationToEnd
# Look for memory backend settings
- assertVisible:
    text: "Memory"
    optional: true
- assertVisible:
    text: "Backend"
    optional: true
# Collapse it
- tapOn: "What GUAPPA Remembers"
- waitForAnimationToEnd
