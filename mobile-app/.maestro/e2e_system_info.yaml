appId: com.guappa.app
name: "E2E: System Info Tool — get device information"
tags:
  - e2e
  - tools
  - system

---

- launchApp:
    clearState: false
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Get Started"
    commands:
      - tapOn: "Get Started"
      - waitForAnimationToEnd

- tapOn:
    id: "dock-tab-chat"
- waitForAnimationToEnd

- tapOn:
    id: "chat-input"
- inputText: "Get my device system information"
- tapOn:
    id: "chat-send-button"
- extendedWaitUntil:
    visible:
      "Android"
    timeout: 30000
