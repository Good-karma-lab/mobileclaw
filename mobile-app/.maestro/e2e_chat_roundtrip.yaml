# E2E Test: Chat Roundtrip
#
# Pre-requisites:
#   - App already configured with valid OpenRouter API key
#   - minimax/minimax-m2.5 or any valid model
#   - Internet connectivity
#
# This test covers:
#   1. Navigate to chat screen
#   2. Send a message
#   3. Verify response appears
#   4. Verify input clears after send
#   5. Send a second message to verify no stuck state

appId: com.guappa.app
---

# ── Navigate to Chat ──

- tapOn:
    point: "34%,94%"
- waitForAnimationToEnd

- assertVisible:
    text: "Chat"

# ── Send First Message ──

- tapOn:
    id: "chat-input"
- inputText: "Say exactly: pong"
- tapOn:
    id: "chat-send-button"

# Wait for user message to appear
- extendedWaitUntil:
    visible:
      text: "Say exactly: pong"
    timeout: 10000

# Wait for input to clear (response received, isThinking done)
- extendedWaitUntil:
    visible:
      text: "Message GUAPPA..."
    timeout: 25000

# ── Send Second Message (no stuck state) ──

- tapOn:
    id: "chat-input"
- inputText: "What is 10 plus 5?"
- tapOn:
    id: "chat-send-button"

# Verify second message appeared
- extendedWaitUntil:
    visible:
      text: "What is 10 plus 5?"
    timeout: 10000

# Verify input cleared again (no stuck isThinking)
- extendedWaitUntil:
    visible:
      text: "Message GUAPPA..."
    timeout: 25000
