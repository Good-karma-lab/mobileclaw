# E2E Test: Chat Roundtrip
#
# Pre-requisites:
#   - App already configured with valid OpenRouter API key
#   - minimax/minimax-m2.5 or any valid model
#   - Internet connectivity
#
# This test covers:
#   1. Navigate to chat screen
#   2. Send a message
#   3. Verify response appears (input clears)
#   4. Send a second message to verify no stuck state

appId: com.guappa.app
---

# ── Navigate to Chat ──

- tapOn:
    point: "34%,94%"
- waitForAnimationToEnd

- assertVisible:
    text: "Chat"

# ── Send First Message ──

- tapOn:
    id: "chat-input"
- inputText: "Say exactly: pong"
- tapOn:
    id: "chat-send-button"

# Wait for response — input clears to placeholder when done
- extendedWaitUntil:
    visible:
      text: "Message GUAPPA..."
    timeout: 60000

# ── Send Second Message (no stuck state) ──

- tapOn:
    id: "chat-input"
- inputText: "Say exactly: hello"
- tapOn:
    id: "chat-send-button"

# Verify input cleared again (no stuck isThinking)
- extendedWaitUntil:
    visible:
      text: "Message GUAPPA..."
    timeout: 60000
