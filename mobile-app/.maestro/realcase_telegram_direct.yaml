appId: com.mobileclaw.app
---
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 20000
- assertVisible:
    id: chat-input
- tapOn:
    id: chat-input
- inputText: "Send a Telegram message right now that says exactly: REAL_CASE_DIRECT_20260225"
- tapOn:
    id: chat-send-or-voice
- waitForAnimationToEnd:
    timeout: 180000
- assertNotVisible:
    text: "Gateway error"
- assertNotVisible:
    text: "Network request failed"
- assertNotVisible:
    text: "disabled"
- assertNotVisible:
    text: "not available"
