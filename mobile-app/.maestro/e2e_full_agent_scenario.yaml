appId: com.guappa.app
---
# Full agent scenario: memory, tool use, incoming call
# Prerequisites: Provider must be configured with a valid API key

# Step 1: Navigate to Chat
- tapOn: "Chat"
- extendedWaitUntil:
    visible:
      id: "chat-screen"
    timeout: 10000

# Step 2: Type and send "My wife's name is Kate"
- tapOn:
    id: "chat-input"
- inputText: "My wife's name is Kate"
- pressKey: "Enter"

# Step 3: Wait for agent response (up to 120s)
- extendedWaitUntil:
    visible:
      id: "chat-bubble-agent"
    timeout: 120000

# Step 4: Type "When I received incoming call - please send me a message to chat with the number of caller"
- tapOn:
    id: "chat-input"
- inputText: "When I received incoming call - please send me a message to chat with the number of caller"
- pressKey: "Enter"

# Step 5: Wait for agent response
- extendedWaitUntil:
    visible:
      text: ".*call.*"
    timeout: 120000

# Step 6: Wait for incoming call trigger (emulated externally)
# The test operator should run:
# adb shell am broadcast -a android.intent.action.PHONE_STATE --es state RINGING --es incoming_number "+15551234567" -n com.guappa.app/.IncomingCallReceiver
- assertVisible:
    id: "chat-screen"

# Step 7: After call emulation, wait for agent to mention the caller number
- extendedWaitUntil:
    visible:
      text: ".*555.*"
    timeout: 60000

# Step 8: Ask agent to list incoming calls
- tapOn:
    id: "chat-input"
- inputText: "list all incoming calls"
- pressKey: "Enter"
- extendedWaitUntil:
    visible:
      text: ".*call.*"
    timeout: 120000

# Step 9: Ask agent what is my wife's name
- tapOn:
    id: "chat-input"
- inputText: "what is my wife name?"
- pressKey: "Enter"
- extendedWaitUntil:
    visible:
      text: ".*Kate.*"
    timeout: 120000
