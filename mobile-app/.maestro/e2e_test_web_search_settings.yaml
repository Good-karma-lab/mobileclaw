appId: com.mobileclaw.app
---
# E2E Test: Web Search Settings UI
# Tests that Web Search settings card is visible and accepts Brave API key
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      id: chat-input
    timeout: 30000
# Navigate to Settings tab using dock
- tapOn:
    id: dock-tab-settings
- tapOn:
    id: dock-tab-settings
- extendedWaitUntil:
    visible:
      id: screen-settings
    timeout: 10000
# Scroll down to Web Search section
- swipe:
    direction: UP
    duration: 800
- waitForAnimationToEnd:
    timeout: 2000
- swipe:
    direction: UP
    duration: 800
- waitForAnimationToEnd:
    timeout: 2000
# Assert Web Search section is visible
- assertVisible:
    text: "Web Search"
# Assert Brave API key input exists
- assertVisible:
    id: brave-api-key-input
# Enter test key
- tapOn:
    id: brave-api-key-input
- eraseText: 30
- inputText: "test-brave-key-12345"
- waitForAnimationToEnd:
    timeout: 2000
