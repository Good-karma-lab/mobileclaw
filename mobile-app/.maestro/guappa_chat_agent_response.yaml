appId: com.guappa.app
---
# Chat: Send message and wait for agent response
- launchApp
- tapOn:
    id: "dock-tab-chat"
- assertVisible:
    id: "chat-screen"
- tapOn:
    id: "chat-input"
- inputText: "What is your name?"
- hideKeyboard
- tapOn:
    id: "chat-send-button"
- waitForAnimationToEnd
# Wait for agent to respond
- extendedWaitUntil:
    visible:
      id: "chat-bubble-agent"
    timeout: 30000
- assertVisible:
    id: "chat-bubble-agent"
