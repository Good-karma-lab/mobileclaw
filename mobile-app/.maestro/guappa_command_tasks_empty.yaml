appId: com.guappa.app
---
# Command Center: Verify tasks empty state
- launchApp
- tapOn:
    id: "dock-tab-command"
- assertVisible:
    id: "command-screen"
- tapOn: "Tasks"
- waitForAnimationToEnd
# Empty state should show placeholder
- assertVisible:
    id: "tasks-empty-state"
    optional: true
- assertVisible:
    text: "No tasks"
    optional: true
