appId: com.guappa.app
---
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 20000
- assertVisible:
    id: chat-input
- tapOn:
    id: chat-input
- inputText: "Guappa telegram bot pairing: ${TELEGRAM_ID}"
- tapOn:
    id: chat-send-or-voice
- waitForAnimationToEnd:
    timeout: 180000
- assertNotVisible:
    text: "Backend error"
- assertNotVisible:
    text: "Network request failed"
