appId: com.guappa.app
---
# Command Center: Attempt to create a trigger
- launchApp
- tapOn:
    id: "dock-tab-command"
- assertVisible:
    id: "command-screen"
- tapOn: "Triggers"
- waitForAnimationToEnd
# Tap create/add button
- tapOn:
    id: "create-trigger-btn"
    optional: true
- tapOn:
    text: "Add Trigger"
    optional: true
# If a form appears, verify it
- assertVisible:
    id: "trigger-form"
    optional: true
