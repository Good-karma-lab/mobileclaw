appId: com.guappa.app
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000
- tapOn:
    id: "chat-input"
- inputText: "Remember this validation code: GUAPPA-42\n"
- tapOn:
    id: "chat-send-or-voice"
- waitForAnimationToEnd
- tapOn:
    id: "chat-input"
- inputText: "What validation code did I give you?\n"
- tapOn:
    id: "chat-send-or-voice"
- waitForAnimationToEnd
- assertNotVisible: "Gateway error"
- tapOn:
    id: "chat-input"
- inputText: "Guappa telegram bot pairing: 530732407\n"
- tapOn:
    id: "chat-send-or-voice"
- waitForAnimationToEnd
- assertVisible:
    text: "Telegram pairing"
    optional: true
