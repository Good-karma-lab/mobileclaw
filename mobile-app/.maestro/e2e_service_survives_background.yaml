appId: com.guappa.app
name: "E2E: Service Survives Background — minimize, wait, verify response"
tags:
  - e2e
  - service
  - background

---

- launchApp:
    clearState: false
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Get Started"
    commands:
      - tapOn: "Get Started"
      - waitForAnimationToEnd

- tapOn:
    id: "dock-tab-chat"
- waitForAnimationToEnd

# Send a message
- tapOn:
    id: "chat-input"
- inputText: "Hello, I'm testing background persistence"
- tapOn:
    id: "chat-send-button"
- waitForAnimationToEnd:
    timeout: 10000

# Press home to minimize
- pressKey: home
- waitForAnimationToEnd:
    timeout: 30000

# Reopen
- launchApp:
    clearState: false
- waitForAnimationToEnd

# Navigate to chat
- tapOn:
    id: "dock-tab-chat"
- waitForAnimationToEnd

# Verify previous message still visible
- assertVisible: "background persistence"