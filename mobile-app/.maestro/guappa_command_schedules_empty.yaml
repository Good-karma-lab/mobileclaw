appId: com.guappa.app
---
# Command Center: Verify schedules empty state
- launchApp
- tapOn:
    id: "dock-tab-command"
- assertVisible:
    id: "command-screen"
- tapOn: "Schedules"
- waitForAnimationToEnd
# Empty state should show placeholder
- assertVisible:
    id: "schedules-empty-state"
    optional: true
- assertVisible:
    text: "No schedules"
    optional: true
