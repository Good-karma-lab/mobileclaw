appId: com.guappa.app
name: "E2E: Long Conversation Context — many messages then recall early details"
tags:
  - e2e
  - memory
  - context

---

- launchApp:
    clearState: false
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Get Started"
    commands:
      - tapOn: "Get Started"
      - waitForAnimationToEnd

- tapOn:
    id: "dock-tab-chat"
- waitForAnimationToEnd

# Store a distinctive fact early
- tapOn:
    id: "chat-input"
- inputText: "Remember this: my favorite color is turquoise"
- tapOn:
    id: "chat-send-button"
- extendedWaitUntil:
    visible:
      "turquoise"
    timeout: 30000

# Send filler messages
- tapOn:
    id: "chat-input"
- inputText: "Tell me a fun fact about Mars"
- tapOn:
    id: "chat-send-button"
- waitForAnimationToEnd:
    timeout: 15000

- tapOn:
    id: "chat-input"
- inputText: "Tell me a fun fact about Jupiter"
- tapOn:
    id: "chat-send-button"
- waitForAnimationToEnd:
    timeout: 15000

- tapOn:
    id: "chat-input"
- inputText: "Tell me a fun fact about Saturn"
- tapOn:
    id: "chat-send-button"
- waitForAnimationToEnd:
    timeout: 15000

# Now recall the early fact
- tapOn:
    id: "chat-input"
- inputText: "What is my favorite color?"
- tapOn:
    id: "chat-send-button"
- extendedWaitUntil:
    visible: "turquoise"
    timeout: 30000
